  <text x="200" y="440" fill="#dbe8ff" font-family="Segoe UI, Arial, sans-serif" font-size="24">Java</text>
  <rect x="175" y="480" width="200" height="54" rx="18" fill="#1d3568"/>
  <text x="200" y="515" fill="#dbe8ff" font-family="Segoe UI, Arial, sans-serif" font-size="24">SQL</text>
  <rect x="175" y="555" width="200" height="54" rx="18" fill="#1d3568"/>
  <text x="200" y="590" fill="#dbe8ff" font-family="Segoe UI, Arial, sans-serif" font-size="24">JavaScript</text>
