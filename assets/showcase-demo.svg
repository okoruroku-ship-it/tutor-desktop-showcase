  <text x="200" y="720" fill="#9fc0ff" font-family="Segoe UI, Arial, sans-serif" font-size="18">Laboratorio y reportes</text>
  <rect x="440" y="250" width="1005" height="94" rx="24" fill="#ffffff"/>
  <text x="480" y="305" fill="#10203e" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Panel del alumno</text>
