  <text x="880" y="690" fill="#c67900" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Reportes PDF</text>
  <text x="909" y="722" fill="#da8a06" font-family="Segoe UI, Arial, sans-serif" font-size="22">Exportables</text>
  <rect x="1120" y="570" width="325" height="190" rx="28" fill="#dfe9ff"/>
  <text x="1155" y="615" fill="#17366c" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Stack</text>
  <text x="1155" y="658" fill="#31568f" font-family="Segoe UI, Arial, sans-serif" font-size="24">Python</text>
