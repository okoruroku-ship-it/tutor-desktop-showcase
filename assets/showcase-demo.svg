<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Tutor Desktop Showcase</title>
  <desc id="desc">Ilustracion demostrativa de una aplicacion de escritorio para rutas de aprendizaje, progreso y laboratorio de codigo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2042"/>
      <stop offset="100%" stop-color="#2f74ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="140" r="170" fill="#7fc8ff" opacity="0.12"/>
  <circle cx="230" cy="760" r="210" fill="#9fd2ff" opacity="0.09"/>
